  <style>
    :root {
      --bg: #f0f2f7;
      --surface: #ffffff;
      --surface2: #f7f8fc;
      --border: #e2e6f0;
      --accent: #4F8EF7;
      --accent2: #6C63FF;
      --accent-glow: rgba(79, 142, 247, 0.18);
      --text: #1a1d2e;
      --text-muted: #7a8099;
      --success: #22c27a;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 4px 24px rgba(79,142,247,0.07), 0 1px 4px rgba(30,40,80,0.06);
      --shadow-lg: 0 12px 48px rgba(79,142,247,0.13), 0 2px 8px rgba(30,40,80,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Geologica', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 0%, rgba(79,142,247,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(108,99,255,0.08) 0%, transparent 70%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    /* ─── Header ─── */
    header {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeUp 0.6s ease both;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 16px rgba(79,142,247,0.3);
    }

    .logo-text {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    /* ─── Card ─── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      padding: 32px 32px 28px;
      width: 100%;
      max-width: 720px;
      animation: fadeUp 0.6s ease both;
    }

    .card + .card { margin-top: 20px; animation-delay: 0.15s; }

    /* ─── Section label ─── */
    .section-label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* ─── Textarea ─── */
    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--text);
      background: var(--surface2);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
      background: var(--surface);
    }

    textarea::placeholder { color: #b0b8d0; }

    /* ─── Options row ─── */
    .options {
      margin: 20px 0 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }

    .checkbox-wrap input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      position: relative;
      flex-shrink: 0;
    }

    .checkbox-wrap input[type="checkbox"]:checked {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
      box-shadow: 0 2px 8px rgba(79,142,247,0.35);
    }

    .checkbox-wrap input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      top: 3px; left: 6px;
      width: 5px; height: 9px;
      border: 2px solid white;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    .checkbox-label {
      font-size: 0.9rem;
      color: var(--text);
      font-weight: 400;
    }

    .checkbox-label span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      padding: 1px 6px;
      border-radius: 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent2);
      margin: 0 2px;
    }

    /* ─── Buttons ─── */
    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: var(--radius-sm);
      font-family: 'Geologica', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
      letter-spacing: 0.01em;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: white;
      box-shadow: 0 4px 18px rgba(79,142,247,0.35);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(79,142,247,0.45);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1.5px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
      color: var(--text);
    }

    .btn-copy {
      background: linear-gradient(135deg, var(--success) 0%, #1aaa6a 100%);
      color: white;
      box-shadow: 0 4px 18px rgba(34,194,122,0.28);
    }

    .btn-copy:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(34,194,122,0.38);
    }

    .btn-copy.copied {
      background: linear-gradient(135deg, #22c27a, #1aaa6a);
    }

    /* ─── Result card ─── */
    .result-card {
      display: none;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      padding: 28px 32px;
      width: 100%;
      max-width: 720px;
      margin-top: 20px;
      animation: fadeUp 0.4s ease both;
    }

    .result-card.visible { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .result-label {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      background: linear-gradient(135deg, var(--success), #1aaa6a);
      color: white;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .result-text {
      width: 100%;
      min-height: 160px;
      resize: vertical;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--text);
      background: #f7fff9;
      outline: none;
      margin-bottom: 16px;
    }

    /* ─── Stats ─── */
    .stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .stat {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stat strong { color: var(--accent); font-weight: 600; }

    /* ─── Divider ─── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    /* ─── Footer ─── */
    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: #b0b8d0;
      text-align: center;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    /* ─── Animations ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Responsive ─── */
    @media (max-width: 500px) {
      .card, .result-card { padding: 22px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">✦</div>
    <span class="logo-text">ТекстФикс</span>
  </div>
  <p class="subtitle">Умная замена символов в тексте — быстро и без лишних усилий</p>
</header>

<!-- Input card -->
<div class="card">
  <div class="section-label">Исходный текст</div>
  <textarea id="inputText" placeholder="Вставьте ваш текст сюда — с длинными тире, буквой ё и другими символами…"></textarea>

  <div class="options">
    <label class="checkbox-wrap">
      <input type="checkbox" id="chkDash" checked>
      <span class="checkbox-label">Заменять <span>—</span> на <span>-</span></span>
    </label>
    <label class="checkbox-wrap">
      <input type="checkbox" id="chkYo">
      <span class="checkbox-label">Заменять <span>ё</span> / <span>Ё</span> на <span>е</span> / <span>Е</span></span>
    </label>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="processText()">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Обработать
    </button>
    <button class="btn btn-secondary" onclick="clearAll()">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24"><path d="M6 6l12 12M6 18L18 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      Очистить
    </button>
  </div>
</div>

<!-- Result card -->
<div class="result-card" id="resultCard">
  <div class="result-header">
    <div class="result-label">
      <div class="section-label" style="margin:0">Результат</div>
      <span class="badge">готово</span>
    </div>
    <button class="btn btn-copy" id="copyBtn" onclick="copyText()">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/></svg>
      Скопировать текст
    </button>
  </div>

  <textarea id="outputText" class="result-text"></textarea>

  <div class="divider"></div>

  <div class="stats">
    <div class="stat">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24"><path d="M4 6h16M4 12h10M4 18h7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Символов: <strong id="statChars">—</strong>
    </div>
    <div class="stat">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Замен сделано: <strong id="statReplacements">—</strong>
    </div>
  </div>
</div>

<footer>ТекстФикс &nbsp;·&nbsp; Без регистрации, без рекламы, всё локально</footer>

<script>
  function processText() {
    const input = document.getElementById('inputText').value;
    if (!input.trim()) return;

    const chkDash = document.getElementById('chkDash').checked;
    const chkYo   = document.getElementById('chkYo').checked;

    let result = input;
    let replacements = 0;

    if (chkDash) {
      const before = result;
      result = result.replace(/\u2014/g, '-'); // em dash —
      result = result.replace(/\u2013/g, '-'); // en dash –
      replacements += (before.match(/[\u2014\u2013]/g) || []).length;
    }

    if (chkYo) {
      const before = result;
      result = result.replace(/ё/g, 'е').replace(/Ё/g, 'Е');
      replacements += (before.match(/[ёЁ]/g) || []).length;
    }

    document.getElementById('outputText').value = result;
    document.getElementById('statChars').textContent = result.length.toLocaleString('ru');
    document.getElementById('statReplacements').textContent = replacements.toLocaleString('ru');

    const card = document.getElementById('resultCard');
    card.classList.add('visible');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    // Reset copy button
    const btn = document.getElementById('copyBtn');
    btn.classList.remove('copied');
    btn.innerHTML = `<svg width="15" height="15" fill="none" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/></svg> Скопировать текст`;
  }

  function copyText() {
    const text = document.getElementById('outputText').value;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.classList.add('copied');
      btn.innerHTML = `<svg width="15" height="15" fill="none" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg> Скопировано!`;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<svg width="15" height="15" fill="none" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/></svg> Скопировать текст`;
      }, 2200);
    });
  }

  function clearAll() {
    document.getElementById('inputText').value = '';
    document.getElementById('outputText').value = '';
    document.getElementById('resultCard').classList.remove('visible');
  }

  // Ctrl+Enter shortcut
  document.getElementById('inputText').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) processText();
  });
</script>
</body>
</html>
